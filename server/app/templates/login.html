<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 珍智账</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💜</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css?v=13">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/regular/style.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"><link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/regular/style.css"></noscript>
</head>
<body>
    <div class="auth-page">
        <div class="auth-box auth-card animate-in">
            <h1>珍智账</h1>
            <p class="sub">为了理想生活而奋斗</p>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                </div>
                <div class="chk-row">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">记住登录状态（7天）</label>
                </div>
                <div class="error" id="errorMsg"></div>
                <button type="submit" class="submit-btn">登录</button>
            </form>
            <div class="switch">还没有账号？<a href="/register">立即注册</a></div>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script src="/static/js/shared.js?v=1"></script>
    <script src="/static/js/auth.js?v=1"></script>
</body>
</html>
