version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: cashbook-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cashbook
      MYSQL_USER: cashbook
      MYSQL_PASSWORD: cashbook_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password

  app:
    build: .
    container_name: cashbook-app
    restart: always
    ports:
      - "9090:9090"
    environment:
      - DATABASE_URL=mysql+pymysql://cashbook:cashbook_password@db:3306/cashbook?charset=utf8mb4
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this}
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db

volumes:
  db_data:
  uploads:
